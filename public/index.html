<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <meta name="theme-color" content="#0049e5">
    <title>Hearth</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="pwa/manifest.json">
    <link rel="stylesheet" href="css/style.css">

    <script defer src="pwa/pwa.js"></script>
    <script defer src="js/Q.js"></script>
    <script defer src="js/connection.js"></script>
    <script defer src="js/network.js"></script>
    <script defer src="js/notifications/notification-settings.js"></script>
    <script defer src="js/notifications/notification-manager.js"></script>
    <script defer src="js/script.js"></script>
</head>

<body data-bs-theme="dark">

    <header class="app-header">
        <img src="resources/logo.png" alt="Hearth" class="app-logo">
        <span class="app-title">Hearth</span>
    </header>

    <!-- Notification permission banner — shown only when permission is 'default' -->
    <div id="notif-permission-banner" class="d-none">
        <div class="d-flex align-items-center gap-3 px-3 py-2" style="background-color:hsl(221,30%,12%);border-bottom:1px solid var(--border-color);">
            <small class="flex-grow-1" style="color:var(--bs-body-color);">Ενεργοποίησε τις ειδοποιήσεις για ημερήσιες υπενθυμίσεις.</small>
            <button type="button" id="btn-enable-notifications" class="btn btn-sm btn-outline-primary flex-shrink-0">Ενεργοποίηση</button>
        </div>
    </div>

    <main class="main-content">

        <!-- Overdue section — hidden when empty -->
        <section id="section-overdue" class="dashboard-section d-none">
            <h2 class="section-title section-title--overdue">Εκπρόθεσμες</h2>
            <div id="list-overdue"></div>
        </section>

        <!-- Today section -->
        <section id="section-today" class="dashboard-section">
            <h2 class="section-title">Σήμερα</h2>
            <div id="list-today"></div>
        </section>

        <!-- Upcoming section -->
        <section id="section-upcoming" class="dashboard-section">
            <h2 class="section-title">Επόμενες</h2>
            <div id="list-upcoming"></div>
        </section>

    </main>

    <a href="app/add-connection.html" class="fab" aria-label="Προσθήκη επαφής">+</a>

</body>
</html>
